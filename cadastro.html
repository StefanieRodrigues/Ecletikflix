<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Cadastro</title>
</head>

<body>

    <h2>Tela de Cadastro com Formulário</h2>

    <table border="1" width="500" align="center">

        <!-- Barra superior -->
        <tr>
            <td>

                ← →
                ✖
                🏠

                <input type="text" size="25">

                🔍

            </td>
        </tr>

        <!-- Conteúdo -->
        <tr>
            <td align="center">

                <h1>Cadastro de Usuários</h1>

                <form>

                    <table>

                        <!-- Nome -->
                        <tr>
                            <td>Nome:</td>
                            <td>
                                <input type="text" size="35">
                            </td>
                        </tr>

                        <!-- Endereço -->
                        <tr>
                            <td>Endereço:</td>
                            <td>
                                <input type="text" size="35">
                            </td>
                        </tr>

                        <!-- Email -->
                        <tr>
                            <td>E-mail:</td>
                            <td>
                                <input type="email" size="35">
                            </td>
                        </tr>

                        <!-- Cidade -->
                        <tr>
                            <td>Cidade:</td>
                            <td>
                                <input type="text" size="35">
                            </td>
                        </tr>

                        <!-- Estado -->
                        <tr>
                            <td>Estado:</td>
                            <td>

                                <select>
                                    <option>São Paulo</option>
                                    <option>Rio de Janeiro</option>
                                    <option>Minas Gerais</option>
                                    <option>Bahia</option>
                                </select>

                            </td>
                        </tr>

                        <!-- Sexo -->
                        <tr>
                            <td>Sexo:</td>
                            <td>

                                <input type="radio" name="sexo">
                                Masculino

                                <input type="radio" name="sexo">
                                Feminino

                            </td>
                        </tr>

                    </table>

                    <br>

                    <p>Escolha os filmes você mais gosta</p>

                    <!-- Checkboxes -->
                    <input type="checkbox"> Ação <br><br>

                    <input type="checkbox"> Aventura <br><br>

                    <input type="checkbox"> Comédia <br><br>

                    <input type="checkbox"> Suspense <br><br>

                    <input type="checkbox"> Drama <br><br>

                    <input type="checkbox"> Romance <br><br>

                    <input type="checkbox"> Terror

                    <br><br><br>

                    <table>

                        <!-- Usuário -->
                        <tr>
                            <td>Usuário:</td>
                            <td>
                                <input type="text" size="35">
                            </td>
                        </tr>

                        <!-- Senha -->
                        <tr>
                            <td>Senha:</td>
                            <td>
                                <input type="password" size="35">
                            </td>
                        </tr>

                    </table>

                    <br><br>

                    <!-- Botões -->
                    <input type="reset" value="Cancelar">

                    <input type="reset" value="Limpar">

                    <input type="submit" value="Cadastrar">

                    <br><br>

                    <!-- Link -->
                    <a href="login.html">Voltar</a>

                </form>

            </td>
        </tr>

        <!-- Rodapé -->
        <tr>
            <td align="right">
                ⚡
            </td>
        </tr>

    </table>

</body>

</html>
